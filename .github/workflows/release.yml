name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build XPI
        run: |
          zip -r gmail-navbar-shortcuts-${{ steps.version.outputs.version }}.xpi \
            manifest.json \
            background.js \
            content/ \
            shared/ \
            sidebar/ \
            icons/ \
            --exclude "icons/generate-icons.js"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: gmail-navbar-shortcuts-${{ steps.version.outputs.version }}.xpi
