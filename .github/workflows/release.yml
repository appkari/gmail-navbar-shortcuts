name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build XPI
        run: |
          zip -r gmail-navbar-shortcuts-${{ steps.version.outputs.version }}.xpi \
            manifest.json \
            background.js \
            vars.js \
            svgs.js \
            content.js \
            options.html \
            options.js \
            options.css \
            icons/ \
            --exclude "icons/generate-icons.js"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: gmail-navbar-shortcuts-${{ steps.version.outputs.version }}.xpi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Submit to Mozilla Add-ons
        run: |
          echo '{"categories":{"firefox":["other"]},"version":{"license":"MIT"}}' > amo-metadata.json
          npx web-ext sign \
            --source-dir . \
            --artifacts-dir ./amo-artifacts \
            --channel listed \
            --api-key "${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret "${{ secrets.AMO_JWT_SECRET }}" \
            --amo-metadata amo-metadata.json \
            --ignore-files "apps-script/**" ".github/**" "icons/generate-icons.js" "README.md" "*.xpi" "amo-metadata.json"
